<app-public-navbar [showSearch]="false"></app-public-navbar>

<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 64px); background: var(--oms-bg);">
  <div class="container" style="max-width: 420px;">
    <div class="card shadow-sm p-4">
      <h3 class="mb-1 text-center">OMS Login</h3>
      <p class="text-muted text-center mb-3">Sign in to continue</p>

      <label class="form-label small text-muted mb-1">Login as</label>
      <div class="btn-group w-100 mb-3" role="group">
        <button type="button" class="btn"
                [ngClass]="loginAs === 'CUSTOMER' ? 'btn-oms-primary text-white' : 'btn-outline-primary'"
                (click)="setLoginAs('CUSTOMER')">Customer</button>
        <button type="button" class="btn"
                [ngClass]="loginAs === 'ADMIN' ? 'btn-oms-primary text-white' : 'btn-outline-primary'"
                (click)="setLoginAs('ADMIN')">Admin</button>
      </div>

      <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" formControlName="username"
                 [placeholder]="loginAs === 'ADMIN' ? 'admin' : 'your username'">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" formControlName="password">
        </div>
        <button class="btn btn-oms-primary text-white w-100 py-2" type="submit" [disabled]="loading || form.invalid">
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <p class="text-center mt-3 mb-0" *ngIf="loginAs === 'CUSTOMER'">
        New customer? <a routerLink="/register">Register here</a>
      </p>
      <p class="text-center text-muted small mt-2" *ngIf="loginAs === 'ADMIN'"> </p>
    </div>
  </div>
</div>
