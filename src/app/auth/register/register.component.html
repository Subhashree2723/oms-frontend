<app-public-navbar [showSearch]="false"></app-public-navbar>
<div class="container" style="max-width: 520px; margin-top: 50px;">
  <div class="card shadow-sm p-4">
    <h3 class="mb-3 text-center">Customer Registration</h3>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Full Name</label>
          <input class="form-control" formControlName="fullName">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" formControlName="username">
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" formControlName="email">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" formControlName="password">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input class="form-control" formControlName="phone">
      </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <input class="form-control" formControlName="address">
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">City</label>
          <input class="form-control" formControlName="city">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">State</label>
          <input class="form-control" formControlName="state">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Pincode</label>
          <input class="form-control" formControlName="pincode">
        </div>
      </div>
      <button class="btn btn-primary w-100" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>
    <p class="text-center mt-3 mb-0">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
