<div class="container-fluid">
  <h3 class="mb-4">Reports</h3>
  <p class="text-muted">Filter by date range and, optionally, by customer, product, or category. Leave a
  field blank to include everything for that filter.</p>

  <div class="card p-3">
    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label">From date</label>
        <input class="form-control" type="date" [(ngModel)]="from">
      </div>
      <div class="col-md-3">
        <label class="form-label">To date</label>
        <input class="form-control" type="date" [(ngModel)]="to">
      </div>
      <div class="col-md-2">
        <label class="form-label">Customer ID</label>
        <input class="form-control" type="number" [(ngModel)]="customerId">
      </div>
      <div class="col-md-2">
        <label class="form-label">Product ID</label>
        <input class="form-control" type="number" [(ngModel)]="productId">
      </div>
      <div class="col-md-2">
        <label class="form-label">Category ID</label>
        <input class="form-control" type="number" [(ngModel)]="categoryId">
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-success me-2" (click)="exportExcel()">Export Excel</button>
      <button class="btn btn-danger" (click)="exportPdf()">Export PDF</button>
    </div>
  </div>
</div>
