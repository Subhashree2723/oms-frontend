<div class="container-fluid">
  <h3 class="mb-4">Customer Support Tickets</h3>

  <div class="row">
    <div class="col-md-6">
      <div class="table-responsive p-2">
        <table class="table table-hover align-middle">
          <thead><tr><th>Subject</th><th>Status</th><th></th></tr></thead>
          <tbody>
            <tr *ngFor="let i of issues" [class.table-active]="selected?.id === i.id">
              <td>{{ i.subject }}</td>
              <td>
                <select class="form-select form-select-sm" [ngModel]="i.status" (ngModelChange)="updateStatus(i, $event)">
                  <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
                </select>
              </td>
              <td><button class="btn btn-sm btn-outline-primary" (click)="open(i)">View</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="col-md-6" *ngIf="selected">
      <div class="card p-3">
        <h6>{{ selected.subject }}</h6>
        <p>{{ selected.description }}</p>
        <hr>
        <div *ngFor="let r of replies" class="mb-2">
          <strong>{{ r.repliedBy }}:</strong> {{ r.message }}
          <div class="text-muted small">{{ r.createdAt | date:'short' }}</div>
        </div>
        <div class="input-group mt-2">
          <input class="form-control" placeholder="Type a reply..." [(ngModel)]="replyMessage">
          <button class="btn btn-primary" (click)="sendReply()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>
