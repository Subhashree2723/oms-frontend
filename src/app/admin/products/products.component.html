<div class="container-fluid">
  <h3 class="mb-4">Product Management</h3>

  <div class="card p-3 mb-4">
    <h6>{{ editingId ? 'Edit Product' : 'Add New Product' }}</h6>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <div class="row g-2">
      <div class="col-md-3">
        <input class="form-control" placeholder="Name" [(ngModel)]="form.name">
      </div>
      <div class="col-md-3">
        <select class="form-select" [(ngModel)]="form.categoryId">
          <option [value]="0" disabled>Select Category</option>
          <option *ngFor="let c of categories" [value]="c.id">
            {{ c.parentId ? '— ' + c.name : c.name }}
          </option>
        </select>
      </div>
      <div class="col-md-2">
        <input class="form-control" type="number" placeholder="Price" [(ngModel)]="form.price">
      </div>
      <div class="col-md-2">
        <input class="form-control" type="number" placeholder="GST %" [(ngModel)]="form.gstPercent">
      </div>
      <div class="col-md-2">
        <input class="form-control" type="file" (change)="onFileSelected($event)">
      </div>
      <div class="col-md-8">
        <input class="form-control" placeholder="Description" [(ngModel)]="form.description">
      </div>
      <div class="col-md-4">
        <button class="btn btn-primary me-2" (click)="save()">{{ editingId ? 'Update' : 'Add' }}</button>
        <button class="btn btn-secondary" *ngIf="editingId" (click)="resetForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="table-responsive p-2">
    <table class="table table-hover align-middle">
      <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>GST%</th><th>Stock</th><th>Active</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let p of products">
          <td><img [src]="p.imageUrl | imageUrl" width="40" height="40" style="object-fit:cover"></td>
          <td>{{ p.name }}</td>
          <td>{{ p.categoryName }}</td>
          <td>₹{{ p.price }}</td>
          <td>{{ p.gstPercent }}%</td>
          <td>{{ p.stockQty }}</td>
          <td><span class="badge" [ngClass]="p.active ? 'bg-success' : 'bg-secondary'">{{ p.active ? 'Active' : 'Inactive' }}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(p)">Edit</button>
            <button class="btn btn-sm btn-outline-danger" (click)="delete(p.id!)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
