<div class="container-fluid">
  <h3 class="mb-4">Customer Support</h3>

  <div class="card p-3 mb-4">
    <h6>Raise a New Ticket</h6>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <div class="mb-2">
      <input class="form-control" placeholder="Subject" [(ngModel)]="form.subject">
    </div>
    <div class="mb-2">
      <textarea class="form-control" rows="3" placeholder="Describe your issue..." [(ngModel)]="form.description"></textarea>
    </div>
    <button class="btn btn-primary" (click)="submit()">Submit Ticket</button>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="table-responsive p-2">
        <table class="table table-hover align-middle">
          <thead><tr><th>Subject</th><th>Status</th><th></th></tr></thead>
          <tbody>
            <tr *ngFor="let i of issues">
              <td>{{ i.subject }}</td>
              <td><span class="badge bg-secondary">{{ i.status }}</span></td>
              <td><button class="btn btn-sm btn-outline-primary" (click)="view(i)">View</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="col-md-6" *ngIf="selected">
      <div class="card p-3">
        <h6>{{ selected.subject }}</h6>
        <p>{{ selected.description }}</p>
        <hr>
        <div *ngFor="let r of replies" class="mb-2">
          <strong>{{ r.repliedBy }}:</strong> {{ r.message }}
          <div class="text-muted small">{{ r.createdAt | date:'short' }}</div>
        </div>
        <div class="text-muted" *ngIf="replies.length === 0">No replies yet.</div>
      </div>
    </div>
  </div>
</div>
