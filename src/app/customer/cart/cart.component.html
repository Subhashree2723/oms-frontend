<div class="container-fluid">
  <h3 class="mb-4">Your Cart</h3>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

  <div class="table-responsive p-2" *ngIf="(cart.items$ | async) as items">
    <table class="table align-middle" *ngIf="items.length > 0">
      <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let i of items">
          <td>{{ i.product.name }}</td>
          <td>₹{{ i.product.price }}</td>
          <td style="max-width: 100px">
            <input class="form-control form-control-sm" type="number" min="1" [ngModel]="i.quantity"
                   (ngModelChange)="updateQty(i.product.id!, $event)">
          </td>
          <td>₹{{ (i.product.price * i.quantity * (1 + i.product.gstPercent / 100)) | number:'1.2-2' }}</td>
          <td><button class="btn btn-sm btn-outline-danger" (click)="remove(i.product.id!)">Remove</button></td>
        </tr>
      </tbody>
    </table>
    <div class="text-muted" *ngIf="items.length === 0">Your cart is empty. <a routerLink="/shop">Continue shopping</a>.</div>
  </div>

  <div class="card p-3 mt-3" *ngIf="cart.items.length > 0" style="max-width: 500px;">
    <h5>Total: ₹{{ cart.total | number:'1.2-2' }}</h5>
    <div class="mb-3">
      <label class="form-label">Delivery Address</label>
      <textarea class="form-control" rows="2" [(ngModel)]="deliveryAddress"></textarea>
    </div>
    <button class="btn btn-success" [disabled]="placing" (click)="placeOrder()">
      {{ placing ? 'Placing order...' : 'Place Order (No online payment required)' }}
    </button>
  </div>
</div>
